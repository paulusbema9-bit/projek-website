<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Daftar Hadir Acara</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Signature Pad Library -->
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    
    <style>
        body {
            background-color: #0d1117;
            background-image: url("./bg_absen.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            padding-bottom: 50px;
        }

        .lpp-badge {
            background-color: #dc3545;
            color: white;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .event-title {
            color: #000;
            font-weight: bold;
            font-size: 1.5rem;
            margin-bottom: 5px;
            text-align: center;
        }

        .event-organizer {
            color: #000;
            font-size: 0.9rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .form-card-title {
            color: #58a6ff;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-subtitle {
            color: #8b949e;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }

        .form-label {
            color: #c9d1d9;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .form-label .text-danger {
            color: #f85149 !important;
        }

        .form-control, .form-select {
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 6px;
        }

        .form-control:focus, .form-select:focus {
            background-color: #0d1117;
            color: #fff;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }

        .signature-container {
            border: 1px solid #30363d;
            border-radius: 6px;
            background-color: #fff; /* White canvas for clear signature */
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 200px;
            display: block;
        }

        .btn-reset {
            background-color: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            font-size: 0.8rem;
            padding: 5px 15px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .btn-reset:hover {
            background-color: #30363d;
            color: #fff;
        }

        .btn-submit {
            background-color: #1f6feb;
            color: #fff;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            padding: 12px;
            width: 100%;
            transition: background-color 0.2s;
        }
        .btn-submit:hover {
            background-color: #388bfd;
        }

        .form-check-label {
            font-size: 0.85rem;
            color: #8b949e;
        }
        
        .form-check-input {
            background-color: #0d1117;
            border-color: #30363d;
        }
        .form-check-input:checked {
            background-color: #238636;
            border-color: #238636;
        }

        .back-link {
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.85rem;
            margin-top: 25px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .back-link:hover {
            text-decoration: underline;
        }

        /* Loading Overlay */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0d1117;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
        <h5 class="mt-3 text-primary fw-bold">Memuat Form...</h5>
    </div>

    <div class="lpp-badge">
        <i class="fas fa-tv"></i> LPP TVRI
    </div>

    <h1 class="event-title" id="lblJudul">Memuat Judul...</h1>
    <p class="event-organizer" id="lblSubjudul"></p>

    <div class="form-card px-3 px-md-4">
        <div class="form-card-title">
            <i class="fas fa-edit"></i> Form Daftar Hadir
        </div>
        <p class="form-subtitle">Silakan isi data diri Anda untuk konfirmasi kehadiran acara.</p>

        <form id="formKehadiran">
            <div class="mb-3">
                <label class="form-label">Jenis Peserta <span class="text-danger">*</span></label>
                <select id="inpJenis" class="form-select" required>
                    <option value="" disabled selected>Pilih Peserta ...</option>
                    <option value="Internal TVRI">Internal TVRI</option>
                    <option value="Eksternal/Tamu">Eksternal / Tamu</option>
                </select>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nama Peserta <span class="text-danger">*</span></label>
                    <input type="text" id="inpNama" class="form-control" placeholder="Nama Lengkap" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" id="inpEmail" class="form-control" placeholder="email@example.com" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">NIP <span class="text-danger">*</span></label>
                    <input type="text" id="inpNip" class="form-control" placeholder="NIP" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nomor HP <span class="text-danger">*</span></label>
                    <input type="text" id="inpHp" class="form-control" placeholder="Nomor HP" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Jabatan</label>
                    <input type="text" id="inpJabatan" class="form-control" placeholder="Kosongkan jika tidak ada">
                </div>
                <div class="col-md-6 mb-4">
                    <label class="form-label">Asal Instansi/Satuan Kerja <span class="text-danger">*</span></label>
                    <input type="text" id="inpInstansi" class="form-control" placeholder="Asal Instansi" required>
                </div>
            </div>

            <div class="form-card-title mt-2 mb-3" style="font-size: 0.95rem;">
                <i class="fas fa-pen"></i> TTD Sebagai Bukti Kehadiran Pada Acara
            </div>

            <div class="signature-container">
                <canvas id="signatureCanvas"></canvas>
            </div>

            <div class="d-flex justify-content-between align-items-start mb-4">
                <button type="button" class="btn-reset" onclick="clearSignature()"><i class="fas fa-eraser me-1"></i> Reset TTD</button>
                <div class="form-check text-end w-75">
                    <input class="form-check-input float-none ms-0 me-2" type="checkbox" id="checkVerifikasi" required>
                    <label class="form-check-label" for="checkVerifikasi">
                        saya menyatakan ini adalah benar tanda tangan saya
                    </label>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn-submit">
                <i class="fas fa-check-circle me-1"></i> Daftar Hadir
            </button>
        </form>
    </div>

    <a href="#" id="linkKembali" class="back-link">
        <i class="fas fa-arrow-left"></i> Kembali ke Halaman Utama
    </a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDTx_0nd6vz4ptWSI02mMCsKK0ZTeLSF_Q",
            authDomain: "sistem-tu-c58ee.firebaseapp.com",
            projectId: "sistem-tu-c58ee",
            storageBucket: "sistem-tu-c58ee.firebasestorage.app",
            messagingSenderId: "844322733823",
            appId: "1:844322733823:web:73d71d3d083633f5a716ca"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let eventId = new URLSearchParams(window.location.search).get('id');
        
        // Initialize Signature Pad
        const canvas = document.getElementById('signatureCanvas');
        const signaturePad = new SignaturePad(canvas, {
            backgroundColor: 'rgb(255, 255, 255)', // Set white background for the pad
            penColor: 'rgb(0, 0, 0)'
        });

        // Resize canvas to be responsive
        function resizeCanvas() {
            const ratio =  Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear(); // otherwise signature gets messed up on resize
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        window.clearSignature = () => {
            signaturePad.clear();
        };

        async function init() {
            if (!eventId) {
                document.getElementById('lblJudul').innerText = "Acara Tidak Ditemukan";
                document.getElementById('loadingOverlay').classList.add('d-none');
                return;
            }

            document.getElementById('linkKembali').href = 'event.html?id=' + eventId;

            try {
                const docSnap = await getDoc(doc(db, "events", eventId));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('lblJudul').innerText = data.judul || '';
                    document.getElementById('lblSubjudul').innerText = data.subjudul || '';
                } else {
                    document.getElementById('lblJudul').innerText = "Acara Tidak Ditemukan";
                }
            } catch (error) {
                console.error("Gagal memuat data", error);
            }

            document.getElementById('loadingOverlay').classList.add('d-none');
        }

        document.getElementById('formKehadiran').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (signaturePad.isEmpty()) {
                alert("Mohon isi tanda tangan Anda pada kotak yang disediakan.");
                return;
            }

            if (!document.getElementById('checkVerifikasi').checked) {
                alert("Harap centang pernyataan kebenaran tanda tangan.");
                return;
            }

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Mengirim...`;

            try {
                const dataKehadiran = {
                    jenisPeserta: document.getElementById('inpJenis').value,
                    nama: document.getElementById('inpNama').value.trim(),
                    email: document.getElementById('inpEmail').value.trim(),
                    nip: document.getElementById('inpNip').value.trim(),
                    noHp: document.getElementById('inpHp').value.trim(),
                    jabatan: document.getElementById('inpJabatan').value.trim(),
                    instansi: document.getElementById('inpInstansi').value.trim(),
                    signatureDataUrl: signaturePad.toDataURL("image/png"), // Save as base64 png
                    waktuHadir: new Date().toISOString()
                };

                await addDoc(collection(db, "events", eventId, "kehadiran"), dataKehadiran);
                
                alert("Terima kasih, kehadiran Anda telah tercatat dengan Tanda Tangan.");
                window.location.href = 'event.html?id=' + eventId; // Redirect back

            } catch (error) {
                console.error("Error saving attendance", error);
                alert("Gagal menyimpan kehadiran: " + error.message);
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-check-circle me-1"></i> Daftar Hadir`;
            }
        });

        init();
    </script>
</body>
</html>
