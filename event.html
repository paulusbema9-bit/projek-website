<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Acara TVRI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f4f8;
            background-image: url("./bg_absen.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #002B5E;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .tvri-logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: #002B5E;
            letter-spacing: -2px;
            margin-top: 40px;
        }
        .tvri-logo span {
            color: #0054A6;
        }
        .tvri-subtitle {
            font-weight: bold;
            letter-spacing: 2px;
            color: #555;
            margin-bottom: 40px;
        }

        .event-title {
            font-weight: 800;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 10px;
            color: #002B5E;
        }

        .event-organizer {
            font-size: 1.1rem;
            color: #555;
            text-align: center;
            margin-bottom: 40px;
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .countdown-box {
            background: #fff;
            border: 2px solid #0054A6;
            border-radius: 15px;
            width: 80px;
            height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 43, 94, 0.1);
            transition: transform 0.3s ease;
        }
        .countdown-box:hover {
            transform: translateY(-5px);
        }

        .countdown-number {
            font-size: 2.2rem;
            font-weight: bold;
            color: #0054A6;
            line-height: 1;
        }

        .countdown-label {
            font-size: 0.8rem;
            color: #666;
            font-weight: 600;
            margin-top: 5px;
        }

        .buttons-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 900px;
            margin-bottom: 40px;
        }

        .btn-custom {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            width: 130px;
            height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: #002B5E;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .btn-custom:hover {
            background: #002B5E;
            color: #fff;
            transform: translateY(-5px);
            border-color: #002B5E;
        }

        .btn-custom i {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #0054A6;
            transition: color 0.3s ease;
        }
        
        .btn-custom:hover i {
            color: #fff;
        }

        .btn-custom span {
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
        }

        .btn-absen {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 176, 155, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 50px;
        }

        .btn-absen:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 176, 155, 0.6);
            color: white;
        }

        .footer {
            margin-top: auto;
            margin-bottom: 20px;
            color: #888;
            font-size: 0.8rem;
        }
        
        /* Loading Overlay */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #f0f4f8;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* Dark Modal Styles */
        .dark-modal .modal-content {
            background-color: #111827; /* Dark Gray / Blackish */
            color: #fff;
            border-radius: 20px;
            border: 2px solid #1f2937;
        }
        .dark-modal .modal-header {
            border-bottom: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
        }
        .dark-modal .modal-title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 10px;
        }
        .dark-modal .modal-icon {
            font-size: 2.5rem;
            color: #3b82f6; /* Blue icon */
        }
        .dark-modal .modal-body {
            padding: 20px 30px 40px;
        }
        .dark-modal .btn-close-custom {
            background-color: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            font-weight: bold;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        .dark-modal .btn-close-custom:hover {
            background-color: #2563eb;
        }
        .dark-modal .file-item {
            background-color: #1f2937;
            border-radius: 10px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .dark-modal .file-item a {
            color: #eab308; /* Yellow download icon */
            font-size: 1.2rem;
        }
        .dark-modal .zoom-box {
            background-color: #1f2937;
            border-radius: 10px;
            padding: 20px;
            font-size: 0.95rem;
        }
        .dark-modal .zoom-box strong {
            color: #9ca3af;
        }
        .dark-modal .empty-state {
            text-align: center;
            color: #9ca3af;
            font-size: 0.9rem;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
        <h5 class="mt-3 text-primary fw-bold">Memuat Acara...</h5>
    </div>

    <div class="tvri-logo">TV<span>RI</span></div>
    <div class="tvri-subtitle">JAWA TENGAH</div>

    <div id="contentArea" class="d-none w-100 d-flex flex-column align-items-center px-3">
        <div class="text-center w-100" style="max-width: 800px;">
            <div class="mb-4 text-primary" style="font-size: 0.9rem; font-weight: bold; letter-spacing: 1px;">🕖 MENUJU ACARA</div>
            
            <h1 class="event-title" id="lblJudul">Memuat Judul...</h1>
            <p class="event-organizer" id="lblSubjudul"></p>

            <div class="countdown-container" id="countdownContainer">
                <div class="countdown-box">
                    <div class="countdown-number" id="cdHari">00</div>
                    <div class="countdown-label">Hari</div>
                </div>
                <div class="countdown-box">
                    <div class="countdown-number" id="cdJam">00</div>
                    <div class="countdown-label">Jam</div>
                </div>
                <div class="countdown-box">
                    <div class="countdown-number" id="cdMenit">00</div>
                    <div class="countdown-label">Menit</div>
                </div>
                <div class="countdown-box">
                    <div class="countdown-number" id="cdDetik">00</div>
                    <div class="countdown-label">Detik</div>
                </div>
            </div>

            <div class="buttons-grid" id="buttonsGrid">
                <!-- Buttons will be injected here -->
            </div>

            <button class="btn-absen" onclick="bukaModalKehadiran()">
                <i class="fas fa-edit me-2"></i> Form Kehadiran
            </button>
            <p class="small text-muted mb-5">Klik tombol di atas untuk mengisi daftar hadir.</p>
        </div>
    </div>

    <!-- MODAL DARK UNTUK ASET (File & Zoom) -->

    <div class="modal fade dark-modal" id="modalDataEvent" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header pb-0">
                    <i id="modalDataIcon" class="fas fa-file-pdf modal-icon"></i>
                    <h5 class="modal-title" id="modalDataTitle">Materi</h5>
                </div>
                <div class="modal-body" id="modalDataBody">
                    <!-- Konten dinamis akan dimuat di sini -->
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 TVRI Jawa Tengah - Pusat Data dan Strategi
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDTx_0nd6vz4ptWSI02mMCsKK0ZTeLSF_Q",
            authDomain: "sistem-tu-c58ee.firebaseapp.com",
            projectId: "sistem-tu-c58ee",
            storageBucket: "sistem-tu-c58ee.firebasestorage.app",
            messagingSenderId: "844322733823",
            appId: "1:844322733823:web:73d71d3d083633f5a716ca"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let eventId = new URLSearchParams(window.location.search).get('id');
        let targetTime = 0;
        let countdownTimer = null;

        async function init() {
            if (!eventId) {
                document.getElementById('lblJudul').innerText = "Acara Tidak Ditemukan";
                document.getElementById('loadingOverlay').classList.add('d-none');
                document.getElementById('contentArea').classList.remove('d-none');
                return;
            }

            try {
                const docSnap = await getDoc(doc(db, "events", eventId));
                if (!docSnap.exists()) {
                    document.getElementById('lblJudul').innerText = "Acara Tidak Ditemukan";
                    document.getElementById('loadingOverlay').classList.add('d-none');
                    document.getElementById('contentArea').classList.remove('d-none');
                    return;
                }

                const data = docSnap.data();
                document.getElementById('lblJudul').innerText = data.judul;
                document.getElementById('lblSubjudul').innerText = data.subjudul || '';

                if (data.waktu) {
                    targetTime = new Date(data.waktu).getTime();
                    mulaiCountdown();
                }

                renderButtons(data);

                document.getElementById('loadingOverlay').classList.add('d-none');
                document.getElementById('contentArea').classList.remove('d-none');

            } catch (error) {
                console.error("Gagal mengambil data", error);
                alert("Kesalahan koneksi.");
            }
        }

        let globalEventData = null;

        function renderButtons(data) {
            globalEventData = data;
            const grid = document.getElementById('buttonsGrid');
            grid.innerHTML = '';

            const btnConfig = [
                { id: 'Undangan', key: 'Undangan', icon: 'fa-envelope-open-text' },
                { id: 'Zoom Meeting', key: 'Zoom', icon: 'fa-video' },
                { id: 'Virtual Background', key: 'VB', icon: 'fa-image' },
                { id: 'Materi', key: 'Materi', icon: 'fa-file-pdf' },
                { id: 'Notula', key: 'Notula', icon: 'fa-pen-nib' },
                { id: 'Dokumentasi', key: 'Dokumentasi', icon: 'fa-camera' }
            ];

            btnConfig.forEach(btn => {
                const a = document.createElement('a');
                a.className = "btn-custom";
                a.onclick = () => bukaModalAset(btn.id, btn.key, btn.icon);
                a.innerHTML = `<i class="fas ${btn.icon}"></i><span>${btn.id}</span>`;
                grid.appendChild(a);
            });
        }

        window.bukaModalAset = (title, key, iconClass) => {
            document.getElementById('modalDataTitle').innerText = title;
            document.getElementById('modalDataIcon').className = `fas ${iconClass} modal-icon`;
            
            const body = document.getElementById('modalDataBody');
            body.innerHTML = ''; // Clear

            let contentHTML = '';

            if (key === 'Zoom') {
                const z = globalEventData.zoom;
                if (z && (z.id || z.link)) {
                    contentHTML = `
                        <div class="zoom-box mb-3">
                            <div class="mb-2"><i class="fas fa-id-card me-2"></i><strong>Meeting ID:</strong> <span class="ms-1 text-white">${z.id || '-'}</span></div>
                            <div class="mb-2"><i class="fas fa-key me-2"></i><strong>Password:</strong> <span class="ms-1 text-white">${z.pass || '-'}</span></div>
                            <div class="mb-2"><i class="fas fa-link me-2"></i><strong>Link:</strong> <a href="${z.link}" target="_blank" class="ms-1 text-info text-break">${z.link}</a></div>
                        </div>
                        <div class="d-flex gap-2">
                            <a href="${z.link}" target="_blank" class="btn btn-outline-info w-50 fw-bold"><i class="fas fa-external-link-alt me-1"></i> Open Zoom</a>
                            <a href="https://api.whatsapp.com/send?text=Silakan bergabung ke Zoom Meeting%0A%0AMeeting ID: ${z.id}%0APasscode: ${z.pass}%0ATautan: ${z.link}" target="_blank" class="btn btn-success w-50 fw-bold"><i class="fab fa-whatsapp me-1"></i> Send ke WA</a>
                        </div>
                    `;
                } else {
                    contentHTML = `<div class="empty-state">Belum ada data zoom tersedia</div>`;
                }
            } else {
                const files = globalEventData[`files${key}`] || [];
                if (files.length > 0) {
                    files.forEach(f => {
                        contentHTML += `
                            <div class="file-item">
                                <div class="d-flex align-items-center overflow-hidden">
                                    <i class="fas fa-file-alt me-3 text-secondary"></i>
                                    <span class="text-truncate" style="max-width: 250px; font-size: 0.9rem;">${f.name}</span>
                                </div>
                                <a href="${f.url}" target="_blank" download><i class="fas fa-download"></i></a>
                            </div>
                        `;
                    });
                } else {
                    contentHTML = `<div class="empty-state">Belum ada file tersedia</div>`;
                }
            }

            contentHTML += `<button type="button" class="btn-close-custom" data-bs-dismiss="modal">Tutup</button>`;
            body.innerHTML = contentHTML;

            const modal = new bootstrap.Modal(document.getElementById('modalDataEvent'));
            modal.show();
        };

        function mulaiCountdown() {
            if (countdownTimer) clearInterval(countdownTimer);
            
            const update = () => {
                const now = new Date().getTime();
                const distance = targetTime - now;

                if (distance < 0) {
                    document.getElementById('cdHari').innerText = "00";
                    document.getElementById('cdJam').innerText = "00";
                    document.getElementById('cdMenit').innerText = "00";
                    document.getElementById('cdDetik').innerText = "00";
                    clearInterval(countdownTimer);
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById('cdHari').innerText = String(days).padStart(2, '0');
                document.getElementById('cdJam').innerText = String(hours).padStart(2, '0');
                document.getElementById('cdMenit').innerText = String(minutes).padStart(2, '0');
                document.getElementById('cdDetik').innerText = String(seconds).padStart(2, '0');
            };
            
            update();
            countdownTimer = setInterval(update, 1000);
        }

        window.bukaModalKehadiran = () => {
            if (!eventId) return;
            window.location.href = 'absen.html?id=' + eventId;
        };

        // Mulai memuat
        init();
    </script>
</body>
</html>
